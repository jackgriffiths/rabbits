founding_rule: The winner of each calendar month shall be the first participant to say rabbits.

amendments:
  - number: 1
    date: "2017-06-01"
    rule: A valid electronic submission must consist of exactly "Rabbits." — beginning with a capital R, followed by "abbits" and a full stop, with no additional characters, spaces, or formatting. Submissions not conforming to this exact form shall be deemed invalid.
  - number: 2
    date: "2018-01-01"
    rule: A valid submission must be delivered via the designated Facebook Messenger group chat. Submissions made through any other medium shall not be recognised.
    repealed_by: 4
  - number: 3
    date: "2019-04-01"
    rule: For the purposes of this game, each calendar month shall be deemed to commence at midnight according to the United Kingdom time zone, including any applicable adjustments for British Summer Time.
  - number: 4
    date: "2020-11-03"
    rule: Amendment 2 is hereby repealed in its entirety. A valid submission must be delivered via the designated Signal group chat. Submissions made through any other medium shall not be recognised.
    repealed_by: 6
  - number: 5
    date: "2021-02-10"
    rule: Participation in this game is irrevocable. No participant may withdraw, resign, or otherwise remove themselves from the game once admitted.
  - number: 6
    date: "2024-11-30"
    rule: Amendment 4 is hereby repealed in its entirety. A valid submission must be delivered via the designated WhatsApp group chat. Submissions made through any other medium shall not be recognised.
